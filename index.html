<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Su Deposu • İnteraktif 3D Şema</title>
<meta name="description" content="Su deposunun bölümleri ve elemanları — havuzluk, manevra odası, tepe savak, dip savak, dolma ve taşma tahliyeleri, debimetreler, bypass — interaktif 3 boyutlu animasyonlu sunum. İller Bankası Mekanik Proje Şartnamesine uyumlu.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700&family=IBM+Plex+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg-0: #07101c;
  --bg-1: #0d1d2e;
  --bg-2: #142a3f;
  --line: rgba(120, 200, 255, 0.14);
  --line-strong: rgba(120, 200, 255, 0.32);
  --ink: #eaf1f8;
  --ink-mute: #8aa3bc;
  --ink-dim: #5d7591;
  --accent: #38d6ff;
  --accent-warm: #ffb547;
  --accent-water: #4fb5ff;
  --accent-red: #ff6b6b;
  --accent-green: #6bd47b;
  --accent-amber: #ffb547;
  --shadow-1: 0 1px 0 rgba(255,255,255,0.05) inset, 0 24px 60px -20px rgba(0,0,0,0.6);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%; height: 100%; overflow: hidden;
  background: var(--bg-0);
  color: var(--ink);
  font-family: 'IBM Plex Sans', system-ui, sans-serif;
  -webkit-font-smoothing: antialiased;
}

body::before {
  content: ''; position: fixed; inset: 0;
  background-image:
    linear-gradient(var(--line) 1px, transparent 1px),
    linear-gradient(90deg, var(--line) 1px, transparent 1px);
  background-size: 48px 48px;
  background-position: -1px -1px;
  pointer-events: none; z-index: 1;
  mask-image: radial-gradient(ellipse 80% 70% at 50% 45%, black 30%, transparent 90%);
  -webkit-mask-image: radial-gradient(ellipse 80% 70% at 50% 45%, black 30%, transparent 90%);
}
body::after {
  content: ''; position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 50% 40% at 75% 20%, rgba(56, 214, 255, 0.10), transparent 60%),
    radial-gradient(ellipse 60% 50% at 15% 90%, rgba(255, 181, 71, 0.07), transparent 60%);
  pointer-events: none; z-index: 1;
}

#scene-host { position: fixed; inset: 0; z-index: 2; }
canvas { display: block; outline: none; }

/* ----- Top header ----- */
.topbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 10;
  display: flex; align-items: center; justify-content: space-between;
  padding: 18px 28px; pointer-events: none;
}
.topbar > * { pointer-events: auto; }
.brand { display: flex; align-items: baseline; gap: 14px; }
.brand .mark {
  display: inline-flex; align-items: center; gap: 8px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; letter-spacing: 0.18em;
  color: var(--accent); text-transform: uppercase;
  padding: 6px 10px; border: 1px solid var(--line-strong);
  border-radius: 999px; background: rgba(56, 214, 255, 0.05);
}
.brand .mark .dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--accent); box-shadow: 0 0 10px var(--accent);
  animation: pulse 2.4s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.brand h1 {
  font-family: 'Bricolage Grotesque', serif; font-weight: 700;
  font-size: 22px; letter-spacing: -0.01em; color: var(--ink);
}
.brand h1 em { font-style: italic; color: var(--accent); font-weight: 500; }
.meta {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; color: var(--ink-mute);
  text-align: right; line-height: 1.6;
}
.meta strong { color: var(--ink); font-weight: 500; }
.meta .tag {
  display: inline-block;
  font-size: 9.5px; letter-spacing: 0.12em;
  padding: 2px 7px; margin-top: 2px;
  background: rgba(255, 181, 71, 0.10);
  color: var(--accent-warm);
  border: 1px solid rgba(255, 181, 71, 0.3);
  border-radius: 4px;
}

/* ----- Side panel ----- */
.panel {
  position: fixed; top: 80px; left: 28px;
  width: 360px; max-width: calc(100vw - 56px); z-index: 10;
  background: linear-gradient(180deg, rgba(13, 29, 46, 0.92), rgba(7, 16, 28, 0.92));
  backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
  border: 1px solid var(--line-strong); border-radius: 16px;
  padding: 22px 22px 18px; box-shadow: var(--shadow-1);
  transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.3s ease;
}
.panel.collapsed {
  transform: translateX(calc(-100% - 40px));
  opacity: 0;
  pointer-events: none;
}
.panel-toggle {
  position: fixed; top: 80px; left: 28px; z-index: 11;
  background: linear-gradient(180deg, rgba(13, 29, 46, 0.92), rgba(7, 16, 28, 0.92));
  backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
  border: 1px solid var(--line-strong);
  border-radius: 12px;
  width: 40px; height: 40px;
  display: none;
  align-items: center; justify-content: center;
  cursor: pointer; color: var(--ink-mute);
  font-family: 'JetBrains Mono', monospace;
  font-size: 16px; line-height: 1;
  transition: all 0.3s ease;
}
.panel-toggle.visible { display: flex; }
.panel-toggle:hover { color: var(--accent); border-color: var(--accent); }
.panel .close-btn {
  position: absolute; top: 14px; right: 14px;
  background: transparent; border: 1px solid var(--line);
  width: 26px; height: 26px;
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  color: var(--ink-dim);
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px; line-height: 1;
  transition: all 0.2s ease;
  padding: 0;
}
.panel .close-btn:hover {
  color: var(--accent);
  border-color: var(--accent);
  background: rgba(56, 214, 255, 0.08);
}
.panel-header {
  display: flex; align-items: center; gap: 12px; margin-bottom: 14px;
}
.panel-header .num {
  font-family: 'JetBrains Mono', monospace; font-size: 12px;
  color: var(--bg-0); background: var(--accent);
  padding: 4px 8px; border-radius: 6px;
  font-weight: 500; letter-spacing: 0.06em;
  min-width: 44px; text-align: center;
}
.panel-header h2 {
  font-family: 'Bricolage Grotesque', serif; font-size: 20px;
  font-weight: 700; letter-spacing: -0.01em; line-height: 1.15;
}
.panel .role {
  font-family: 'JetBrains Mono', monospace; font-size: 10.5px;
  letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--ink-dim); margin-bottom: 12px;
}
.panel .desc {
  font-size: 14px; line-height: 1.6;
  color: var(--ink-mute); margin-bottom: 16px;
}
.panel .desc strong { color: var(--ink); font-weight: 500; }
.panel .specs {
  display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
  border-top: 1px dashed var(--line-strong); padding-top: 14px;
}
.panel .specs .spec { font-family: 'JetBrains Mono', monospace; }
.panel .specs .spec .k {
  font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--ink-dim); margin-bottom: 2px;
}
.panel .specs .spec .v { font-size: 13px; color: var(--ink); }
.panel .src {
  margin-top: 10px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9.5px; letter-spacing: 0.06em;
  color: var(--ink-dim);
  border-top: 1px dashed var(--line);
  padding-top: 10px;
}
.panel .src strong { color: var(--accent-warm); font-weight: 500; }

/* ----- Component list ----- */
.components {
  position: fixed; bottom: 28px; left: 28px; z-index: 10;
  display: flex; flex-direction: column; gap: 4px;
  background: linear-gradient(180deg, rgba(13, 29, 46, 0.88), rgba(7, 16, 28, 0.88));
  backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
  border: 1px solid var(--line-strong); border-radius: 14px;
  padding: 12px;
  width: 360px; max-width: calc(100vw - 56px);
  max-height: calc(100vh - 360px);
  overflow-y: auto;
  transition: opacity 0.3s ease, transform 0.3s ease;
}
.components.hidden {
  opacity: 0;
  transform: translateY(14px);
  pointer-events: none;
}
.components.visible {
  bottom: 88px;
}
.components-toggle {
  position: fixed;
  bottom: 28px; left: 28px;
  z-index: 11;
  width: 44px; height: 44px;
  background: linear-gradient(180deg, rgba(13, 29, 46, 0.92), rgba(7, 16, 28, 0.92));
  backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
  border: 1px solid var(--line-strong);
  border-radius: 12px;
  cursor: pointer;
  color: var(--ink-mute);
  font-family: 'JetBrains Mono', monospace;
  font-size: 18px; line-height: 1;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.25s ease;
  padding: 0;
}
.components-toggle:hover { color: var(--accent); border-color: var(--accent); }
.components-toggle.active {
  background: var(--accent); color: var(--bg-0); border-color: var(--accent);
  box-shadow: 0 0 0 4px rgba(56, 214, 255, 0.18);
}
.components .title {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--ink-dim); padding: 4px 8px 8px;
}
.components button {
  all: unset; cursor: pointer;
  display: flex; align-items: center; gap: 12px;
  padding: 9px 12px; border-radius: 9px;
  font-size: 13px; color: var(--ink-mute);
  transition: background 0.2s, color 0.2s;
  border: 1px solid transparent;
}
.components button:hover { background: rgba(56, 214, 255, 0.07); color: var(--ink); }
.components button.active {
  background: rgba(56, 214, 255, 0.10);
  color: var(--ink); border-color: var(--line-strong);
}
.components button .swatch {
  width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0;
}
.components button .num {
  font-family: 'JetBrains Mono', monospace; font-size: 10.5px;
  color: var(--ink-dim); width: 22px;
}
.components button.active .num { color: var(--accent); }

/* ----- Bottom-right controls ----- */
.controls {
  position: fixed; bottom: 28px; right: 28px; z-index: 10;
  display: flex; flex-direction: column; gap: 10px; align-items: flex-end;
  transition: opacity 0.3s ease, transform 0.3s ease;
}
.controls.hidden {
  opacity: 0;
  transform: translateY(14px);
  pointer-events: none;
}
.controls-toggle {
  position: fixed;
  bottom: 28px; right: 28px;
  z-index: 11;
  width: 44px; height: 44px;
  background: linear-gradient(180deg, rgba(13, 29, 46, 0.92), rgba(7, 16, 28, 0.92));
  backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
  border: 1px solid var(--line-strong);
  border-radius: 12px;
  cursor: pointer;
  color: var(--ink-mute);
  font-family: 'JetBrains Mono', monospace;
  font-size: 20px; line-height: 1;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.25s ease;
  padding: 0;
}
.controls-toggle:hover { color: var(--accent); border-color: var(--accent); }
.controls-toggle.active {
  background: var(--accent); color: var(--bg-0); border-color: var(--accent);
  box-shadow: 0 0 0 4px rgba(56, 214, 255, 0.18);
}
.controls.visible {
  bottom: 88px;  /* toggle butonun üstüne yerleşsin */
}
.control-group {
  display: flex; gap: 6px;
  background: linear-gradient(180deg, rgba(13, 29, 46, 0.88), rgba(7, 16, 28, 0.88));
  backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
  border: 1px solid var(--line-strong); border-radius: 12px; padding: 6px;
}
.control-group button {
  all: unset; cursor: pointer;
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 12.5px; color: var(--ink-mute);
  padding: 9px 14px; border-radius: 8px;
  display: inline-flex; align-items: center; gap: 8px;
  transition: background 0.2s, color 0.2s;
}
.control-group button:hover { background: rgba(56, 214, 255, 0.08); color: var(--ink); }
.control-group button.primary {
  background: var(--accent); color: var(--bg-0); font-weight: 500;
}
.control-group button.primary:hover { background: #5fe2ff; color: var(--bg-0); }
.control-group button.warm {
  background: rgba(255, 181, 71, 0.18); color: var(--accent-warm);
  border: 1px solid rgba(255, 181, 71, 0.3);
}
.control-group button.warm.on {
  background: var(--accent-warm); color: var(--bg-0); border-color: var(--accent-warm);
}
.control-group button .ico {
  font-family: 'JetBrains Mono', monospace; font-size: 14px; line-height: 1;
}
.water-gauge {
  background: linear-gradient(180deg, rgba(13, 29, 46, 0.88), rgba(7, 16, 28, 0.88));
  backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
  border: 1px solid var(--line-strong); border-radius: 12px;
  padding: 10px 14px;
  display: flex; align-items: center; gap: 12px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; color: var(--ink-mute);
}
.water-gauge .label { letter-spacing: 0.14em; text-transform: uppercase; font-size: 9.5px; color: var(--ink-dim); }
.water-gauge .value { color: var(--accent-water); font-weight: 500; font-size: 13px; min-width: 40px; }
.water-gauge .bar {
  width: 80px; height: 6px; background: rgba(255,255,255,0.06);
  border-radius: 3px; overflow: hidden; position: relative;
}
.water-gauge .bar-fill {
  position: absolute; left: 0; top: 0; bottom: 0;
  background: linear-gradient(90deg, var(--accent-water), var(--accent));
  transition: width 0.4s ease;
}

/* ----- 3D labels (CSS2D) ----- */
.label3d { pointer-events: auto; cursor: pointer; user-select: none; }
.label3d .pin {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 5px 10px 5px 5px;
  background: rgba(7, 16, 28, 0.85);
  backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  border: 1px solid var(--line-strong);
  border-radius: 999px;
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 11.5px; color: var(--ink); white-space: nowrap;
  transition: all 0.2s;
  transform: translate(8px, -50%);
}
.label3d .pin .num {
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  background: var(--accent); color: var(--bg-0);
  width: 20px; height: 20px; border-radius: 50%;
  display: inline-flex; align-items: center; justify-content: center;
  font-weight: 500;
}
.label3d:hover .pin { background: rgba(56, 214, 255, 0.18); border-color: var(--accent); }
.label3d.active .pin {
  background: var(--accent); color: var(--bg-0); border-color: var(--accent);
  box-shadow: 0 0 0 6px rgba(56, 214, 255, 0.18);
}
.label3d.active .pin .num { background: var(--bg-0); color: var(--accent); }
.label3d.hidden { display: none !important; }

/* ----- 3D dimension label (height etc.) ----- */
.dim-label {
  pointer-events: none; user-select: none;
}
.dim-label .pill {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; letter-spacing: 0.04em;
  background: rgba(255, 181, 71, 0.18);
  color: var(--accent-warm);
  border: 1px solid rgba(255, 181, 71, 0.4);
  padding: 3px 8px;
  border-radius: 4px;
  white-space: nowrap;
  transform: translate(-50%, -50%);
  display: inline-block;
}

/* ----- Flow meter live readout (CSS2D, attached to FT box) ----- */
.fm-screen {
  pointer-events: none; user-select: none;
}
.fm-screen .lcd {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; line-height: 1.1;
  background: #b8e54c;
  color: #0a2e0a;
  padding: 3px 6px 3px;
  border-radius: 2px;
  border: 1px solid #5d7e1f;
  text-align: right;
  min-width: 64px;
  font-weight: 600;
  transform: translate(-50%, -50%);
  box-shadow: inset 0 0 6px rgba(0,0,0,0.15);
}
.fm-screen .lcd .tag {
  display: block;
  font-size: 7px; font-weight: 500;
  color: #2a4a08;
  letter-spacing: 0.1em;
  text-align: left;
  margin-bottom: 1px;
}
.fm-screen .lcd .v { font-size: 10px; }
.fm-screen .lcd .u { font-size: 7px; opacity: 0.75; margin-left: 2px; }

/* ----- Bypass toggle marker (CSS2D, on top of V_BP) ----- */
.bypass-toggle {
  pointer-events: auto; user-select: none; cursor: pointer;
}
.bypass-toggle .knob {
  display: inline-flex; align-items: center; gap: 5px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9.5px; letter-spacing: 0.08em;
  padding: 4px 8px;
  border-radius: 4px;
  background: rgba(7, 16, 28, 0.92);
  border: 1px solid rgba(255, 107, 107, 0.5);
  color: var(--accent-red);
  transform: translate(-50%, -150%);
  white-space: nowrap;
  transition: all 0.2s;
}
.bypass-toggle .knob.open {
  border-color: rgba(107, 212, 123, 0.6);
  color: var(--accent-green);
  background: rgba(107, 212, 123, 0.12);
}
.bypass-toggle .knob:hover { transform: translate(-50%, -160%); }
.bypass-toggle .knob .led {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--accent-red);
  box-shadow: 0 0 6px var(--accent-red);
}
.bypass-toggle .knob.open .led {
  background: var(--accent-green); box-shadow: 0 0 6px var(--accent-green);
}

/* ----- Loader ----- */
.loader {
  position: fixed; inset: 0; z-index: 100;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 16px;
  background: var(--bg-0);
  transition: opacity 0.6s ease;
}
.loader.hidden { opacity: 0; pointer-events: none; }
.loader .ring {
  width: 48px; height: 48px;
  border: 2px solid rgba(56, 214, 255, 0.2);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 1s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loader .text {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; letter-spacing: 0.18em;
  color: var(--ink-dim); text-transform: uppercase;
}

/* ----- Mobile ----- */
@media (max-width: 768px) {
  .topbar { padding: 14px 16px; }
  .brand h1 { font-size: 17px; }
  .brand .mark { font-size: 10px; }
  .meta { display: none; }
  .panel { top: 70px; left: 16px; right: 16px; width: auto; padding: 16px; }
  .panel-header h2 { font-size: 17px; }
  .components { left: 16px; right: 16px; bottom: 76px; width: auto; max-height: 38vh; }
  .components.visible { bottom: 76px; }
  .components button { font-size: 12.5px; padding: 8px 10px; }
  .components-toggle { left: 16px; bottom: 16px; }
  .controls { right: 16px; bottom: 76px; }
  .controls.visible { bottom: 76px; }
  .controls-toggle { right: 16px; bottom: 16px; }
  .control-group button { padding: 8px 12px; font-size: 12px; }
  .water-gauge { display: none; }
  .fm-screen .lcd { font-size: 8px; min-width: 54px; }
}
</style>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>
</head>
<body>

<div class="loader" id="loader">
  <div class="ring"></div>
  <div class="text">Sahne Hazırlanıyor</div>
</div>

<div class="topbar">
  <div class="brand">
    <span class="mark"><span class="dot"></span>Komparatör</span>
    <h1>Su Deposu <em>İnteraktif Şema</em></h1>
  </div>
  <div class="meta">
    <strong>Muammer Beslen</strong><br>
    Manevra Odası • 3D Görselleştirme
  </div>
</div>

<div class="panel-toggle" id="panel-toggle" title="Açıklama panelini göster">☰</div>

<div class="panel" id="panel">
  <button class="close-btn" id="panel-close" title="Paneli gizle" aria-label="Kapat">×</button>
  <div class="panel-header">
    <span class="num" id="panel-num">00</span>
    <h2 id="panel-title">Depo Şeması</h2>
  </div>
  <div class="role" id="panel-role">Genel Bakış</div>
  <div class="desc" id="panel-desc"></div>
  <div class="specs" id="panel-specs"></div>
</div>

<div class="components" id="components">
  <div class="title">Bölümler ve Elemanlar</div>
</div>

<button class="components-toggle" id="components-toggle" title="Bileşen listesini göster" aria-label="Bileşenler">☰</button>

<div class="controls" id="controls">
  <div class="water-gauge">
    <div>
      <div class="label">Su Seviyesi</div>
      <div class="bar"><div class="bar-fill" id="bar-fill" style="width: 60%"></div></div>
    </div>
    <div class="value" id="gauge-value">60%</div>
  </div>
  <div class="control-group">
    <button id="btn-fill" title="Depoyu doldur"><span class="ico">▲</span> Doldur</button>
    <button id="btn-drain" title="Depoyu boşalt"><span class="ico">▼</span> Boşalt</button>
  </div>

// Hollow concrete box (havuzluk veya manevra)
function buildHollowBox(width, depth, height, opts = {}) {
  const t = opts.thickness || 0.18;
  const wallMat = opts.wallMat || matConcrete;
  const showFront = opts.showFront !== false;
  const showBack = opts.showBack !== false;
  const showLeft = opts.showLeft !== false;
  const showRight = opts.showRight !== false;
  const showFloor = opts.showFloor !== false;
  const showRoof = opts.showRoof !== false;

  const group = new THREE.Group();
  const w = width, d = depth, h = height;

  if (showFloor) {
    const floor = new THREE.Mesh(new THREE.BoxGeometry(w, t, d), matConcreteSolid);
    floor.position.y = t / 2;
    floor.receiveShadow = true; floor.castShadow = true;
    group.add(floor);
  }
  if (showRoof) {
    const roof = new THREE.Mesh(new THREE.BoxGeometry(w, t, d), wallMat);
    roof.position.y = h - t / 2;
    group.add(roof);
  }
  if (showBack) {
    const back = new THREE.Mesh(new THREE.BoxGeometry(w, h, t), wallMat);
    back.position.set(0, h / 2, -d / 2 + t / 2);
    group.add(back);
  }
  if (showFront) {
    const front = new THREE.Mesh(new THREE.BoxGeometry(w, h, t), wallMat);
    front.position.set(0, h / 2, d / 2 - t / 2);
    group.add(front);
  }
  if (showLeft) {
    const left = new THREE.Mesh(new THREE.BoxGeometry(t, h, d - 2 * t), wallMat);
    left.position.set(-w / 2 + t / 2, h / 2, 0);
    group.add(left);
  }
  if (showRight) {
    const right = new THREE.Mesh(new THREE.BoxGeometry(t, h, d - 2 * t), wallMat);
    right.position.set(w / 2 - t / 2, h / 2, 0);
    group.add(right);
  }

  const edgesGeom = new THREE.EdgesGeometry(new THREE.BoxGeometry(w, h, d));
  const edges = new THREE.LineSegments(edgesGeom, matEdge);
  edges.position.y = h / 2;
  group.add(edges);

  return group;
}

// Pipe between two arbitrary 3D points
function pipeBetween(p1, p2, mat, radius = 0.13) {
  const dir = new THREE.Vector3().subVectors(p2, p1);
  const len = dir.length();
  if (len < 0.001) return new THREE.Group();
  const geo = new THREE.CylinderGeometry(radius, radius, len, 20, 1, false);
  const m = new THREE.Mesh(geo, mat);
  m.castShadow = true;
  const up = new THREE.Vector3(0, 1, 0);
  const q = new THREE.Quaternion().setFromUnitVectors(up, dir.clone().normalize());
  m.quaternion.copy(q);
  m.position.copy(p1).addScaledVector(dir, 0.5);
  return m;
}

function elbow(p, mat, radius = 0.16) {
  const m = new THREE.Mesh(new THREE.SphereGeometry(radius, 16, 12), mat);
  m.position.copy(p);
  m.castShadow = true;
  return m;
}

// Flanş (boru ucunda veya duvar geçişinde)
function makeFlange(p, dir, mat, radius = 0.22) {
  const m = new THREE.Mesh(new THREE.CylinderGeometry(radius, radius, 0.06, 20), mat);
  const up = new THREE.Vector3(0, 1, 0);
  const q = new THREE.Quaternion().setFromUnitVectors(up, dir.clone().normalize());
  m.quaternion.copy(q);
  m.position.copy(p);
  m.castShadow = true;
  return m;
}

// Sızdırmazlık flanşı (havuzluk-manevra duvar geçişi, kalın)
function makeSealFlange(p, axis, radius = 0.28) {
  const m = new THREE.Mesh(new THREE.CylinderGeometry(radius, radius, 0.18, 20), matSealFlange);
  if (axis === 'x') m.rotation.z = Math.PI / 2;
  else if (axis === 'z') m.rotation.x = Math.PI / 2;
  m.position.copy(p);
  m.castShadow = true;
  return m;
}

// Multi-segment pipe path between waypoints
function pipePath(points, mat, radius = 0.13) {
  const g = new THREE.Group();
  for (let i = 0; i < points.length - 1; i++) {
    g.add(pipeBetween(points[i], points[i + 1], mat, radius));
  }
  for (let i = 1; i < points.length - 1; i++) {
    g.add(elbow(points[i], mat, radius * 1.15));
  }
  return g;
}

// Manuel kelebek vana (volan + gövde)

  g.add(fL);
  const fR = new THREE.Mesh(new THREE.CylinderGeometry(0.27, 0.27, 0.05, 20), matFmFlange);
  fR.position.y = 0.21;
  g.add(fR);

  const stem = new THREE.Mesh(
    new THREE.CylinderGeometry(0.04, 0.04, 0.45, 12),
    new THREE.MeshStandardMaterial({ color: 0x9aa3a8, metalness: 0.7, roughness: 0.3 })
  );
  stem.position.y = 0.42;
  g.add(stem);

  const wheel = new THREE.Mesh(new THREE.TorusGeometry(0.23, 0.035, 12, 24), matValveWheel);
  wheel.rotation.x = Math.PI / 2;
  wheel.position.y = 0.62;
  wheel.castShadow = true;
  g.add(wheel);

  for (let i = 0; i < 4; i++) {
    const spoke = new THREE.Mesh(
      new THREE.CylinderGeometry(0.016, 0.016, 0.42, 8),
      matValveWheel
    );
    spoke.rotation.z = Math.PI / 2;
    spoke.rotation.y = (i * Math.PI) / 2;
    spoke.position.y = 0.62;
    g.add(spoke);
  }

  if (orientationAxis === 'x') g.rotation.z = Math.PI / 2;
  else if (orientationAxis === 'z') g.rotation.x = Math.PI / 2;

  return g;
}

// Motorlu (aktüatörlü) kelebek vana - üstünde gri motor kutusu + LED
function makeMotorValve(orientationAxis = 'y') {

  fR.position.y = 0.21; g.add(fR);

  // Stem (kısa)
  const stem = new THREE.Mesh(
    new THREE.CylinderGeometry(0.05, 0.05, 0.18, 12),

// Demontaj parçası (kısa, iki flanşlı)
function makeDemontaj(orientationAxis = 'y', length = 0.35) {
  const g = new THREE.Group();
  const body = new THREE.Mesh(
    new THREE.CylinderGeometry(0.16, 0.16, length, 16),
    matDemontaj
  );
  body.castShadow = true; g.add(body);

  const fA = new THREE.Mesh(new THREE.CylinderGeometry(0.24, 0.24, 0.05, 18), matFmFlange);
  fA.position.y = -length / 2 + 0.025;
  g.add(fA);
  const fB = new THREE.Mesh(new THREE.CylinderGeometry(0.24, 0.24, 0.05, 18), matFmFlange);
  fB.position.y = length / 2 - 0.025;
  g.add(fB);

  // Cıvata halkası (görsel)
  for (let i = 0; i < 6; i++) {
    const a = (i / 6) * Math.PI * 2;
    const r = 0.21;
    const bolt = new THREE.Mesh(
      new THREE.CylinderGeometry(0.014, 0.014, length - 0.05, 6),
      new THREE.MeshStandardMaterial({ color: 0x4a5160, metalness: 0.8, roughness: 0.3 })
    );
    bolt.position.set(Math.cos(a) * r, 0, Math.sin(a) * r);
    g.add(bolt);
  }

  if (orientationAxis === 'x') g.rotation.z = Math.PI / 2;
  else if (orientationAxis === 'z') g.rotation.x = Math.PI / 2;

  return g;
}

// T-bağlantısı (bypass için)
function makeTBranch(p, mainAxis, branchAxis, mat, radius = 0.13) {
  const g = new THREE.Group();
  // Merkez küre
  const ball = new THREE.Mesh(new THREE.SphereGeometry(radius * 1.3, 18, 14), mat);
  ball.position.copy(p);
  ball.castShadow = true;
  g.add(ball);
  return g;
}

// Krepin (paslanmaz çelik filtreli silindir)
function makeCrepin(p) {
  const g = new THREE.Group();
  // Üst flanş
  const fl = new THREE.Mesh(new THREE.CylinderGeometry(0.24, 0.24, 0.06, 20), matCrepinSS);
  fl.position.y = 0.30;
  g.add(fl);
  // Silindir gövde
  const body = new THREE.Mesh(new THREE.CylinderGeometry(0.18, 0.18, 0.30, 20), matCrepinSS);
  body.position.y = 0.15;
  g.add(body);
  // Konik alt
  const cone = new THREE.Mesh(new THREE.CylinderGeometry(0.18, 0.06, 0.10, 20), matCrepinSS);
  cone.position.y = -0.05;
  g.add(cone);
  // Filtre çubukları (görsel kafes)
  for (let i = 0; i < 8; i++) {
    const a = (i / 8) * Math.PI * 2;
    const bar = new THREE.Mesh(
      new THREE.BoxGeometry(0.012, 0.30, 0.012),
      matCrepinSS
    );
    bar.position.set(Math.cos(a) * 0.18, 0.15, Math.sin(a) * 0.18);
    g.add(bar);
  }
  // Yatay halkalar
  for (let yy = 0; yy < 4; yy++) {
    const ring = new THREE.Mesh(
      new THREE.TorusGeometry(0.18, 0.008, 8, 22),
      matCrepinSS
    );
    ring.rotation.x = Math.PI / 2;
    ring.position.y = 0.02 + yy * 0.085;
    g.add(ring);
  }

  g.position.copy(p);
  g.castShadow = true;
  return g;
}

// Tepe savak (ön duvarın iç yüzünde, yatay çentik)
function makeWeir(width, mat, depth = 0.05) {
  const g = new THREE.Group();
  const lip = new THREE.Mesh(
    new THREE.BoxGeometry(width, 0.06, depth),
    mat
  );
  g.add(lip);
  return g;
}

// Spout (açık dökülüm uç)
function makeSpout(mat, radius = 0.13) {
  const g = new THREE.Group();
  const elbow = new THREE.Mesh(
    new THREE.TorusGeometry(0.20, radius, 12, 16, Math.PI / 2),
    mat
  );
  elbow.rotation.y = Math.PI / 2;
  g.add(elbow);
  // Bell mouth
  const bell = new THREE.Mesh(
    new THREE.CylinderGeometry(radius, radius * 1.5, 0.14, 16),
    mat
  );
  bell.position.set(0, -0.20, 0.20);
  g.add(bell);
  return g;
}

// DOLMA HATLARI D1 & D2 (alt-orta sıra y=Y_DOLMA=1.4)
//
// Akış: dış giriş (manevra ön duvarı) → ön duvar geçişi → V_manuel → DM
//       → debimetre → V_motor → manevra arka duvarına yatay → ortak duvar
//       geçişi → havuzluk içinde dikey kolon yukarı → üst dirsek → açık dökülüm
// =====================================================================
const dolmaGroup = new THREE.Group();
dolmaGroup.userData.id = 'dolma';

// Reference positions for flow display
const flowMeters = []; // {obj, tag, isInlet/isOutlet, chamber, lcd, vSpan, value, targetValue}

function buildDolmaSide(side) {
  const sgn = side;
  const xMain = sgn < 0 ? X_DOLMA_A : X_DOLMA_B;

  // Armatür z koordinatları (ön duvardan iç tarafa doğru)
  // Dış giriş ön duvar önünde
  const z_inExt    = Z_FRONT + 1.4;
  const z_wallOut  = Z_FRONT;
  const z_wallIn   = Z_FRONT_IN;
  const z_Vman     = Z_FRONT - 0.45;     // 3.55
  const z_DM       = Z_FRONT - 0.95;     // 3.05
  const z_F        = Z_FRONT - 1.5;      // 2.5  (5×D düz hat öncesi)
  const z_Vmot     = Z_FRONT - 2.05;     // 1.95
  const z_BackIn   = Z_BACK_IN;          // 0.18 — manevra arka duvar iç
  const z_BackOut  = Z_BACK_OUT;         // 0    — ortak duvar dış (havuzluk yönü)
  const z_HavIn    = Z_HAV_FRONT_IN;     // -0.18 — havuzluk ön duvar iç

  // 1) Manevra ÖN DUVARI dışından giriş (yatay, eksenel z)
  dolmaGroup.add(pipeBetween(
    new THREE.Vector3(xMain, Y_DOLMA, z_inExt),
    new THREE.Vector3(xMain, Y_DOLMA, z_wallOut),
    matPipeBlue
  ));
  dolmaGroup.add(makeFlange(
    new THREE.Vector3(xMain, Y_DOLMA, z_wallOut),
    new THREE.Vector3(0, 0, 1), matPipeBlue, 0.26
  ));

  // 2) Ön duvar iç → V_manuel
  dolmaGroup.add(pipeBetween(
    new THREE.Vector3(xMain, Y_DOLMA, z_wallIn),
    new THREE.Vector3(xMain, Y_DOLMA, z_Vman + 0.27),
    matPipeBlue
  ));
  const vMan = makeValve('z'); vMan.position.set(xMain, Y_DOLMA, z_Vman);
  dolmaGroup.add(vMan);

  // 3) V_manuel → DM
  dolmaGroup.add(pipeBetween(
    new THREE.Vector3(xMain, Y_DOLMA, z_Vman - 0.27),
    new THREE.Vector3(xMain, Y_DOLMA, z_DM + 0.18),
    matPipeBlue
  ));
  const dm = makeDemontaj('z', 0.32); dm.position.set(xMain, Y_DOLMA, z_DM);
  dolmaGroup.add(dm);

  // 4) DM → F (10×D düz hat — sembolik)
  dolmaGroup.add(pipeBetween(
    new THREE.Vector3(xMain, Y_DOLMA, z_DM - 0.18),
    new THREE.Vector3(xMain, Y_DOLMA, z_F + 0.30),
    matPipeBlue
  ));
  const tagName = sgn < 0 ? 'FIT-101' : 'FIT-102';
  const fm = makeFlowMeter('z', tagName);
  fm.position.set(xMain, Y_DOLMA, z_F);
  dolmaGroup.add(fm);
  flowMeters.push({ obj: fm, tag: tagName, isInlet: true, chamber: sgn < 0 ? 'A' : 'B' });

  // 5) F → V_motor (5×D düz hat)
  dolmaGroup.add(pipeBetween(
    new THREE.Vector3(xMain, Y_DOLMA, z_F - 0.30),
    new THREE.Vector3(xMain, Y_DOLMA, z_Vmot + 0.27),
    matPipeBlue
  ));
  const vMot = makeMotorValve('z'); vMot.position.set(xMain, Y_DOLMA, z_Vmot);
  dolmaGroup.add(vMot);

  // 6) V_motor → manevra arka duvar iç yüzü
  dolmaGroup.add(pipeBetween(
    new THREE.Vector3(xMain, Y_DOLMA, z_Vmot - 0.27),
    new THREE.Vector3(xMain, Y_DOLMA, z_BackIn),
    matPipeBlue
  ));

  // 7) Ortak duvar geçişi (sızdırmazlık flanşı)
  dolmaGroup.add(makeSealFlange(
    new THREE.Vector3(xMain, Y_DOLMA, 0), 'z'
  ));

  // 8) Havuzluk ön duvar iç yüzünden başlayıp dikey kolon yukarı
  const havInside_low = new THREE.Vector3(xMain, Y_DOLMA, z_HavIn);
  dolmaGroup.add(pipeBetween(
    new THREE.Vector3(xMain, Y_DOLMA, z_BackOut),
    havInside_low, matPipeBlue
  ));
  dolmaGroup.add(elbow(havInside_low, matPipeBlue, 0.16));

  // 9) Havuzluk içinde dikey kolon yukarı (max kot+0.5 üzerinde)
  const colTop = new THREE.Vector3(xMain, WEIR_Y + 0.5, z_HavIn);
  dolmaGroup.add(pipeBetween(havInside_low, colTop, matPipeBlue));
  dolmaGroup.add(elbow(colTop, matPipeBlue, 0.18));

  // 10) Üstte dirsek -z (havuzluk içine bakıyor)
  const colTopForward = new THREE.Vector3(xMain, WEIR_Y + 0.5, z_HavIn - 0.6);
  dolmaGroup.add(pipeBetween(colTop, colTopForward, matPipeBlue));
  dolmaGroup.add(elbow(colTopForward, matPipeBlue, 0.18));

  // 11) Aşağı bakan açık dökülüm
  const spoutEnd = new THREE.Vector3(xMain, WEIR_Y - 0.05, z_HavIn - 0.6);
  dolmaGroup.add(pipeBetween(colTopForward, spoutEnd, matPipeBlue));
  const bell = new THREE.Mesh(
    new THREE.CylinderGeometry(0.13, 0.20, 0.18, 16),
    matPipeBlue
  );
  bell.position.set(spoutEnd.x, spoutEnd.y - 0.10, spoutEnd.z);
  bell.castShadow = true;
  dolmaGroup.add(bell);

  return { vMan, vMot, fm };
}

  // 4) Manevra arka duvar iç → ön duvar yakını (ön duvardan dışa çıkacak)
  const manevBack = new THREE.Vector3(xCrepin, Y_CIKIS, Z_BACK_IN);
  cikisGroup.add(pipeBetween(havFrontIn, manevBack, matPipeRed));

  // Armatürler manevra odası içinde, ön duvar yakınında (kullanıcı revizyon 4)
  // Sıralama (havuzluğa yakından dış duvara): manevBack(z=0.18) → V_man → DM → F → V_mot → ön duvar
  // 5×D ve 10×D düz hat aralıkları (sembolik)
  const z_Vman = 0.6;     // V3A/V4A manuel
  const z_DM   = 1.05;    // demontaj
  const z_F    = 1.55;    // debimetre F3/F4
  const z_Vmot = 2.05;    // V3B/V4B motorlu
  const z_FrontOut = Z_FRONT;
  const z_DishaIn  = Z_FRONT + 1.2;  // dış uç

  // pipe segments
  cikisGroup.add(pipeBetween(manevBack, new THREE.Vector3(xCrepin, Y_CIKIS, z_Vman - 0.27), matPipeRed));

  const v_man = makeValve('z');
  v_man.position.set(xCrepin, Y_CIKIS, z_Vman);
  cikisGroup.add(v_man);

  cikisGroup.add(pipeBetween(
    new THREE.Vector3(xCrepin, Y_CIKIS, z_Vman + 0.27),
    new THREE.Vector3(xCrepin, Y_CIKIS, z_DM - 0.18),
    matPipeRed
  ));

  const dm = makeDemontaj('z', 0.32);
  dm.position.set(xCrepin, Y_CIKIS, z_DM);
  cikisGroup.add(dm);

  cikisGroup.add(pipeBetween(
    new THREE.Vector3(xCrepin, Y_CIKIS, z_DM + 0.18),
    new THREE.Vector3(xCrepin, Y_CIKIS, z_F - 0.30),
    matPipeRed
  ));

  // F debimetre (çıkış)
  const tagName = sgn < 0 ? 'FT-201' : 'FT-202';
  const fm = makeFlowMeter('z', tagName);
  fm.position.set(xCrepin, Y_CIKIS, z_F);
  cikisGroup.add(fm);
  flowMeters.push({ obj: fm, tag: tagName, isOutlet: true, chamber: sgn < 0 ? 'A' : 'B' });

  cikisGroup.add(pipeBetween(
    new THREE.Vector3(xCrepin, Y_CIKIS, z_F + 0.30),
    new THREE.Vector3(xCrepin, Y_CIKIS, z_Vmot - 0.27),
    matPipeRed
  ));

  const v_mot = makeMotorValve('z');
  v_mot.position.set(xCrepin, Y_CIKIS, z_Vmot);
  cikisGroup.add(v_mot);

  // V_mot → ön duvar geçişi
  cikisGroup.add(pipeBetween(
    new THREE.Vector3(xCrepin, Y_CIKIS, z_Vmot + 0.27),
    new THREE.Vector3(xCrepin, Y_CIKIS, z_FrontOut),
    matPipeRed
  ));
  cikisGroup.add(makeFlange(new THREE.Vector3(xCrepin, Y_CIKIS, z_FrontOut), new THREE.Vector3(0, 0, 1), matPipeRed, 0.26));

  // Dışa
  cikisGroup.add(pipeBetween(
    new THREE.Vector3(xCrepin, Y_CIKIS, z_FrontOut),
    new THREE.Vector3(xCrepin, Y_CIKIS, z_DishaIn),
    matPipeRed
  ));
}

  const z_Vmot = 0.7;
  dipGroup.add(pipeBetween(manevBack, new THREE.Vector3(xDip, Y_DIP, z_Vmot - 0.27), matPipePurple, dipR));

  // V_mot → ön duvardan dışa

    new THREE.Vector3(xDip, Y_DIP, z_Vmot + 0.27),
    new THREE.Vector3(xDip, Y_DIP, Z_FRONT),

  dipGroup.add(makeFlange(new THREE.Vector3(xDip, Y_DIP, Z_FRONT), new THREE.Vector3(0, 0, 1), matPipePurple, 0.28));

    new THREE.Vector3(xDip, Y_DIP, Z_FRONT),
    new THREE.Vector3(xDip, Y_DIP, Z_FRONT + 1.2),
    matPipePurple, dipR
  ));
}

function makeDimensionMarker(yLow, yHigh, x, z, labelText) {
  const g = new THREE.Group();
  const matLine = new THREE.LineBasicMaterial({ color: 0xffb547, transparent: true, opacity: 0.9 });
  // Dikey çizgi
  const vGeom = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(x, yLow, z),
    new THREE.Vector3(x, yHigh, z),
  ]);
  g.add(new THREE.Line(vGeom, matLine));
  // Yatay flak çizgileri
  const tickW = 0.12;
  const tLow = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(x - tickW, yLow, z),
    new THREE.Vector3(x + tickW, yLow, z),
  ]);
  const tHi = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(x - tickW, yHigh, z),
    new THREE.Vector3(x + tickW, yHigh, z),
  ]);
  g.add(new THREE.Line(tLow, matLine));
  g.add(new THREE.Line(tHi, matLine));
  // CSS2D pill
  const pillEl = document.createElement('div');
  pillEl.className = 'dim-label';
  const inner = document.createElement('div');
  inner.className = 'pill';
  inner.textContent = labelText;
  pillEl.appendChild(inner);
  const pillObj = new CSS2DObject(pillEl);
  pillObj.position.set(x, (yLow + yHigh) / 2, z);
  g.add(pillObj);
  return g;
}

function updateWater() {
  const lvl = Math.min(waterLevel, 1.02);
  const h = Math.max(0.001, lvl * WATER_MAX);
  [waterA, waterB].forEach((w, i) => {
    w.scale.y = h;
    const wob = Math.sin(performance.now() * 0.0015 + i * 1.3) * 0.012;
    w.position.y = WALL_T + h / 2 + wob;
  });
  const pct = Math.round(Math.min(1, waterLevel) * 100);
  document.getElementById('gauge-value').textContent = pct + '%';
  document.getElementById('bar-fill').style.width = pct + '%';
}

function updateFlowMeters(dt) {
  // Dolum/boşalım hızına göre canlı debi hesabı
  const filling = waterTarget > waterLevel + 0.005;
  const draining = waterTarget < waterLevel - 0.005;

  flowMeters.forEach((fm) => {
    let target = 0;
    if (fm.isInlet && filling) {
      // Dolma: dolum sırasında aktif (bypass çıkışta, dolmayı etkilemez)
      target = 280 + Math.sin(performance.now() * 0.001 + (fm.chamber === 'A' ? 0 : 1)) * 25;
    } else if (fm.isOutlet && draining) {
      // Çıkış: boşalım sırasında aktif
      // Bypass açıkken: iki çıkış kollektörü birleşir, debi dengelenir (paylaşılır)
      if (bypassOpen) {
        target = 200 + Math.sin(performance.now() * 0.0011 + (fm.chamber === 'A' ? 1 : 0)) * 15;
      } else {
        target = 240 + Math.sin(performance.now() * 0.0011 + (fm.chamber === 'A' ? 1 : 0)) * 20;
      }
    } else {
      target = 0;
    }
    fm.targetValue = target;
    fm.value += (fm.targetValue - fm.value) * Math.min(1, dt * 4);
    if (fm.vSpan) {
      fm.vSpan.textContent = fm.value < 1 ? '0.0' : fm.value.toFixed(0);
    }
  });
}

let lastTime = performance.now();
function animate() {
  requestAnimationFrame(animate);
  const now = performance.now();
  const dt = Math.min(0.05, (now - lastTime) / 1000);
  lastTime = now;

  // Su seviyesi tween
  waterLevel += (waterTarget - waterLevel) * Math.min(1, dt * 0.55);

  updateWater();
  updateFlowMeters(dt);

  controls.update();
  renderer.render(scene, camera);
  labelRenderer.render(scene, camera);
}

  componentsVisible = v;
  componentsHost.classList.toggle('hidden', !v);
  componentsHost.classList.toggle('visible', v);
  componentsToggleEl.classList.toggle('active', v);
  componentsToggleEl.textContent = v ? '×' : '☰';
  componentsToggleEl.title = v ? 'Listeyi gizle' : 'Bileşen listesini göster';
}
componentsToggleEl.addEventListener('click', () => setComponentsVisible(!componentsVisible));
setComponentsVisible(false);

// Kesit toggle (manevra ön duvar opacity)
let cutawayOn = false;
document.getElementById('btn-cutaway').addEventListener('click', () => {
  cutawayOn = !cutawayOn;
  manev.children.forEach((m) => {
    if (m.isMesh && m.material === matConcrete) {
      m.material = m.material.clone();
    }
  });
  // Daha basit: tüm manevra duvarlarını opacity 0/0.16
  manev.traverse((m) => {
    if (m.isMesh && m !== manev.children[0]) {
      // Floor hariç (children[0])
      if (m.material && m.material.transparent) {
        m.material.opacity = cutawayOn ? 0.04 : 0.16;
      }
    }
  });
});

document.getElementById('btn-reset').addEventListener('click', () => {
  camera.position.set(16, 13, 21);
  controls.target.set(0, 2, -1);
  controls.autoRotate = true;
  waterTarget = 0.55;
  waterLevel = 0.55;
  bypassOpen = false;
  setBypassVisuals(false);
  selectComponent(null);
  updatePanel(initial);
  componentsHost.querySelectorAll('button').forEach((b) => b.classList.remove('active'));
  Object.values(labelObjects).forEach(({ el }) => el.classList.remove('active'));
});

// Window resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  labelRenderer.setSize(window.innerWidth, window.innerHeight);
});

// Debug hook
window.depo3d = {
  setWaterLevel: (l) => { waterLevel = waterTarget = Math.max(0, Math.min(1.05, l)); },
  fill: () => { waterTarget = 1.05; },
  drain: () => { waterTarget = 0.05; },
  toggleBypass,
};

</script>
</body>
</html>
